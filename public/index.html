<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>apps.bizapp.club — deployer</title>
<style>
  :root {
    --bg: #0b0d12;
    --panel: #141821;
    --panel-2: #1b2130;
    --border: #262d3d;
    --text: #e6e9ef;
    --muted: #8a93a6;
    --accent: #5b9dff;
    --accent-2: #7c5bff;
    --danger: #ff6171;
    --ok: #3ecf8e;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  a { color: var(--accent); }
  button { cursor: pointer; font: inherit; }
  input, textarea, select {
    width: 100%; background: #0e1119; color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font: inherit;
  }
  textarea { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; min-height: 240px; }
  .btn {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: white; border: 0; border-radius: 8px; padding: 10px 14px; font-weight: 600;
  }
  .btn.secondary { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); }
  .btn.danger { background: var(--danger); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .row { display: flex; gap: 12px; align-items: center; }
  .grid { display: grid; gap: 16px; }
  .muted { color: var(--muted); }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px;
         border: 1px solid var(--border); background: var(--panel-2); }
  .tag.ok { color: var(--ok); border-color: #1f4a3a; background: #0f2218; }
  .tag.warn { color: #ffc857; border-color: #4a3d1f; background: #221a0f; }
  header.top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; border-bottom: 1px solid var(--border); background: #0c0f17;
    position: sticky; top: 0; z-index: 10;
  }
  header.top .brand { font-weight: 700; letter-spacing: .2px; }
  main { max-width: 1080px; margin: 0 auto; padding: 24px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tabs button { background: transparent; color: var(--muted); border: 0; padding: 10px 14px;
                 border-bottom: 2px solid transparent; font-weight: 600; }
  .tabs button.active { color: var(--text); border-bottom-color: var(--accent); }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; font-size: 13px; }
  .toast {
    position: fixed; bottom: 20px; right: 20px; padding: 12px 16px;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; max-width: 360px;
  }
  .toast.error { border-color: #5a2029; background: #2a0f13; }
  .toast.ok { border-color: #1f4a3a; background: #0f2218; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: grid; place-items: center; z-index: 20; }
  .modal { width: min(900px, 96vw); max-height: 90vh; overflow: auto; background: var(--panel);
           border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .hero { padding: 32px 24px; text-align: center; }
  .hero h1 { margin: 0 0 8px; font-size: 26px; }
  .auth-card { max-width: 420px; margin: 48px auto; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .field-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.6px; font-weight: 600; text-transform: uppercase; }
  .field-hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .btn.tiny { padding: 5px 10px; font-size: 12px; font-weight: 500; background: var(--panel-2); border: 1px solid var(--border); color: var(--text); }
  .btn.tiny:hover { background: #232a3c; }
  .code-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; display: block; }
</style>
</head>
<body>
<header class="top">
  <div class="brand">apps.bizapp.club <span class="muted">deployer</span></div>
  <div id="userBox" class="row"></div>
</header>
<main id="view"></main>
<div id="toast"></div>

<script>
const api = async (path, opts = {}) => {
  const res = await fetch(path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
    credentials: 'same-origin',
  });
  const text = await res.text();
  let data; try { data = text ? JSON.parse(text) : null; } catch { data = { raw: text }; }
  if (!res.ok) throw Object.assign(new Error(data?.error || `HTTP ${res.status}`), { data });
  return data;
};
const $ = (sel, root = document) => root.querySelector(sel);
const state = { user: null, tab: 'react', react: [], html: [], meta: { parentDomain: 'apps.bizapp.club', appDomain: 'bizapp.club' } };

function toast(msg, kind = 'ok') {
  const el = $('#toast');
  el.innerHTML = `<div class="toast ${kind}">${msg}</div>`;
  setTimeout(() => { el.innerHTML = ''; }, 3800);
}

function renderUserBox() {
  const box = $('#userBox');
  if (!state.user) {
    box.innerHTML = `<button class="btn secondary" id="btnSignIn">Sign in</button>`;
    $('#btnSignIn').onclick = () => openSignInModal();
    return;
  }
  const who = state.user.email || state.user.username;
  box.innerHTML = `
    <span class="muted">${who} · ${state.user.role}</span>
    <button class="btn secondary" id="btnLogout">Logout</button>`;
  $('#btnLogout').onclick = logout;
}

async function logout() {
  await api('/api/logout', { method: 'POST' });
  state.user = null;
  renderUserBox();
  await refresh();
  toast('Signed out');
}

function renderAuth() {
  $('#view').innerHTML = `
    <section class="panel auth-card">
      <div class="tabs">
        <button class="active" data-t="login">Log in</button>
        <button data-t="register">Register</button>
      </div>
      <form id="authForm" class="grid" style="gap:10px">
        <input name="username" placeholder="username" required autocomplete="username" />
        <input name="password" placeholder="password" type="password" required autocomplete="current-password" />
        <button class="btn" type="submit">Continue</button>
        <div class="muted" id="authHint">Registered users need admin activation before their first login.</div>
      </form>
    </section>`;
  let mode = 'login';
  $('.tabs').onclick = (e) => {
    const b = e.target.closest('button'); if (!b) return;
    mode = b.dataset.t;
    [...$('.tabs').children].forEach((x) => x.classList.toggle('active', x === b));
    $('#authHint').textContent = mode === 'register'
      ? 'New accounts are inactive until an admin activates them.'
      : 'Log in with your existing credentials.';
  };
  $('#authForm').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const body = { username: fd.get('username'), password: fd.get('password') };
    try {
      if (mode === 'register') {
        const r = await api('/api/register', { method: 'POST', body });
        toast(r.message || 'Registered');
      } else {
        const r = await api('/api/login', { method: 'POST', body });
        state.user = r.user;
        renderUserBox();
        await refresh();
      }
    } catch (err) { toast(err.message, 'error'); }
  };
}

async function refresh() {
  try {
    state.meta = await api('/api/meta');
    if (state.user) {
      state.react = await api('/api/apps').catch(() => []);
      state.html = await api('/api/html-apps').catch(() => []);
    } else {
      state.react = [];
      state.html = [];
    }
    renderDashboard();
  } catch (err) { toast(err.message, 'error'); }
}

function renderDashboard() {
  const isAdmin = state.user?.role === 'admin';
  const isAnon = !state.user;
  if (isAnon && state.tab !== 'react' && state.tab !== 'html') state.tab = 'react';
  const subtitle = isAnon
    ? 'Pick React or HTML, paste your code, give it a name. We email you a link to publish — no account needed.'
    : 'React components or raw HTML — each gets its own subdomain with TLS.';
  const reactLabel = `React apps${isAnon ? '' : ` (${state.react.length})`}`;
  const htmlLabel = `HTML apps${isAnon ? '' : ` (${state.html.length})`}`;
  $('#view').innerHTML = `
    <div class="hero">
      <h1>Make your <span style="color:var(--accent)">React</span> or <span style="color:var(--accent)">HTML</span> app live</h1>
      <div class="muted">${subtitle}</div>
    </div>
    <div class="tabs">
      <button data-t="react" class="${state.tab === 'react' ? 'active' : ''}">${reactLabel}</button>
      <button data-t="html" class="${state.tab === 'html' ? 'active' : ''}">${htmlLabel}</button>
      ${isAnon ? '' : `<button data-t="account" class="${state.tab === 'account' ? 'active' : ''}">Account</button>`}
      ${isAdmin ? `<button data-t="admin" class="${state.tab === 'admin' ? 'active' : ''}">Admin</button>` : ''}
    </div>
    <section class="panel" id="tabPanel"></section>`;
  $('.tabs').onclick = (e) => {
    const b = e.target.closest('button'); if (!b) return;
    state.tab = b.dataset.t; renderDashboard();
  };
  if (state.tab === 'react') renderReactTab();
  else if (state.tab === 'html') renderHtmlTab();
  else if (state.tab === 'account') renderAccountTab();
  else if (state.tab === 'admin') renderAdminTab();
}

function appRow(a) {
  return `<tr>
    <td><strong>${a.name}</strong></td>
    <td><a href="https://${a.domain}" target="_blank" rel="noreferrer">${a.domain}</a></td>
    <td class="muted">${a.owner}</td>
    <td class="muted">${new Date(a.updatedAt).toLocaleString()}</td>
    <td class="actions">
      <button class="btn secondary" data-act="edit" data-name="${a.name}">Edit</button>
      <button class="btn danger" data-act="del" data-name="${a.name}">Delete</button>
    </td>
  </tr>`;
}

function renderReactTab() {
  const isAnon = !state.user;
  const emptyMsg = isAnon
    ? `<div class="muted" style="text-align:center;padding:18px 0">No apps yet — click <strong>+ New React app</strong> to deploy your first one.</div>`
    : `<div class="muted">No React apps yet.</div>`;
  $('#tabPanel').innerHTML = `
    <div class="row" style="justify-content:space-between;margin-bottom:12px">
      <h3 style="margin:0">React apps</h3>
      <button class="btn" id="newReact">+ New React app</button>
    </div>
    ${state.react.length === 0 ? emptyMsg : `
    <table>
      <thead><tr><th>Name</th><th>Domain</th><th>Owner</th><th>Updated</th><th></th></tr></thead>
      <tbody>${state.react.map(appRow).join('')}</tbody>
    </table>`}`;
  $('#newReact').onclick = () => openReactModal();
  $('#tabPanel tbody')?.addEventListener('click', async (e) => {
    const b = e.target.closest('button'); if (!b) return;
    const name = b.dataset.name;
    if (b.dataset.act === 'edit') {
      const a = await api(`/api/apps/${name}`);
      openReactModal(a);
    } else if (b.dataset.act === 'del') {
      if (!confirm(`Delete ${name}?`)) return;
      try { await api(`/api/apps/${name}`, { method: 'DELETE' }); toast('Deleted'); refresh(); }
      catch (err) { toast(err.message, 'error'); }
    }
  });
}

function renderHtmlTab() {
  const isAnon = !state.user;
  const emptyMsg = isAnon
    ? `<div class="muted" style="text-align:center;padding:18px 0">No apps yet — click <strong>+ New HTML app</strong> to deploy your first one.</div>`
    : `<div class="muted">No HTML apps yet.</div>`;
  $('#tabPanel').innerHTML = `
    <div class="row" style="justify-content:space-between;margin-bottom:12px">
      <h3 style="margin:0">HTML apps</h3>
      <button class="btn" id="newHtml">+ New HTML app</button>
    </div>
    ${state.html.length === 0 ? emptyMsg : `
    <table>
      <thead><tr><th>Name</th><th>Domain</th><th>Owner</th><th>Updated</th><th></th></tr></thead>
      <tbody>${state.html.map(appRow).join('')}</tbody>
    </table>`}`;
  $('#newHtml').onclick = () => openHtmlModal();
  $('#tabPanel tbody')?.addEventListener('click', async (e) => {
    const b = e.target.closest('button'); if (!b) return;
    const name = b.dataset.name;
    if (b.dataset.act === 'edit') {
      const a = await api(`/api/html-apps/${name}`);
      openHtmlModal(a);
    } else if (b.dataset.act === 'del') {
      if (!confirm(`Delete ${name}?`)) return;
      try { await api(`/api/html-apps/${name}`, { method: 'DELETE' }); toast('Deleted'); refresh(); }
      catch (err) { toast(err.message, 'error'); }
    }
  });
}

function renderAccountTab() {
  const u = state.user || {};
  $('#tabPanel').innerHTML = `
    <div style="max-width:480px">
      <h3 style="margin-top:0">Your account</h3>
      <div class="muted" style="margin-bottom:18px">Logged in as <strong>${u.username || ''}</strong> · ${u.role || ''}</div>
      <h4 style="margin:0 0 10px">Change password</h4>
      <form id="pwForm" class="grid" style="gap:10px">
        <div>
          <div class="field-label">CURRENT PASSWORD</div>
          <input name="oldPassword" type="password" autocomplete="current-password" required />
        </div>
        <div>
          <div class="field-label">NEW PASSWORD</div>
          <input name="newPassword" type="password" autocomplete="new-password" minlength="8" required />
          <div class="field-hint">At least 8 characters.</div>
        </div>
        <div>
          <div class="field-label">CONFIRM NEW PASSWORD</div>
          <input name="confirmPassword" type="password" autocomplete="new-password" minlength="8" required />
        </div>
        <div class="row" style="justify-content:flex-end;gap:8px">
          <button class="btn" type="submit">Update password</button>
        </div>
      </form>
    </div>`;
  $('#pwForm').onsubmit = async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const oldPassword = fd.get('oldPassword');
    const newPassword = fd.get('newPassword');
    const confirmPassword = fd.get('confirmPassword');
    if (newPassword !== confirmPassword) { toast('New passwords do not match', 'error'); return; }
    try {
      await api('/api/change-password', { method: 'POST', body: { oldPassword, newPassword } });
      toast('Password changed — please log in again');
      state.user = null;
      renderUserBox();
      renderAuth();
    } catch (err) { toast(err.message, 'error'); }
  };
}

async function renderAdminTab() {
  const users = await api('/api/admin/users').catch(() => []);
  $('#tabPanel').innerHTML = `
    <h3 style="margin-top:0">Users</h3>
    <table>
      <thead><tr><th>Username</th><th>Role</th><th>Status</th><th>Created</th><th></th></tr></thead>
      <tbody>
        ${users.map((u) => `<tr>
          <td><strong>${u.username}</strong></td>
          <td>${u.role}</td>
          <td>${u.active ? '<span class="tag ok">active</span>' : '<span class="tag warn">inactive</span>'}</td>
          <td class="muted">${new Date(u.createdAt).toLocaleString()}</td>
          <td class="actions">
            <button class="btn secondary" data-act="toggle" data-name="${u.username}">${u.active ? 'Deactivate' : 'Activate'}</button>
            <button class="btn secondary" data-act="resetpw" data-name="${u.username}">Reset password</button>
            ${u.role === 'admin' ? '' : `<button class="btn danger" data-act="del" data-name="${u.username}">Delete</button>`}
          </td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  $('#tabPanel tbody').addEventListener('click', async (e) => {
    const b = e.target.closest('button'); if (!b) return;
    const name = b.dataset.name;
    try {
      if (b.dataset.act === 'toggle') { await api(`/api/admin/users/${name}/toggle`, { method: 'POST' }); }
      else if (b.dataset.act === 'resetpw') {
        const pw = prompt(`Set a new password for ${name} (min 8 chars):`);
        if (pw == null) return;
        if (pw.length < 8) { toast('Password must be at least 8 characters', 'error'); return; }
        await api(`/api/admin/users/${name}/reset-password`, { method: 'POST', body: { newPassword: pw } });
        toast(`Password reset for ${name}`);
      }
      else if (b.dataset.act === 'del') {
        if (!confirm(`Delete user ${name}?`)) return;
        await api(`/api/admin/users/${name}`, { method: 'DELETE' });
      }
      renderAdminTab();
    } catch (err) { toast(err.message, 'error'); }
  });
}

function openModal(html, onOpen) {
  const wrap = document.createElement('div');
  wrap.className = 'modal-bg';
  wrap.innerHTML = `<div class="modal">${html}</div>`;
  wrap.addEventListener('click', (e) => { if (e.target === wrap) wrap.remove(); });
  document.body.appendChild(wrap);
  onOpen?.(wrap);
  return wrap;
}

function openReactModal(existing) {
  const isEdit = !!existing;
  const title = isEdit ? 'Edit React App' : 'Deploy New React App';
  const subInitial = existing && existing.subdomain && existing.subdomain !== existing.name ? existing.subdomain : '';
  const placeholder = `export default function App() {
  const [n, setN] = React.useState(0);
  return (
    <div style={{fontFamily:'system-ui',padding:32}}>
      <h1>Hello from your React app</h1>
      <button onClick={() => setN(n + 1)}>Clicked {n} times</button>
    </div>
  );
}`;
  const modal = openModal(`
    <h3 style="margin-top:0">${title}</h3>
    <div class="grid" style="gap:14px">
      <div>
        <div class="field-label">PAGE NAME</div>
        <input id="rName" placeholder="e.g. myapp" value="${existing?.name || ''}" ${isEdit ? 'readonly' : ''} autocomplete="off" />
        <div class="field-hint">Lowercase, no spaces</div>
      </div>
      <div>
        <div class="field-label">CUSTOM SUBDOMAIN <span class="muted" style="text-transform:none;letter-spacing:0;font-weight:400">(optional)</span></div>
        <input id="rSub" placeholder="Leave empty to use the name above" value="${subInitial}" ${isEdit ? 'readonly' : ''} autocomplete="off" />
      </div>
      <div>
        <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:6px">
          <div class="field-label" style="margin:0">COMPONENT</div>
          <div class="row" style="gap:6px">
            <button type="button" class="btn tiny" id="rSelectAll">⊞ Select All</button>
            <button type="button" class="btn tiny" id="rPaste">📋 Paste</button>
            <button type="button" class="btn tiny" id="rClear">✕ Clear</button>
          </div>
        </div>
        <textarea id="rCode" spellcheck="false" placeholder="Paste your React component here. Must include export default..."></textarea>
        <div class="field-hint">Must contain <code>export default</code>. Will be rendered at the root of the page.</div>
      </div>
      ${!isEdit && !state.user ? `
      <div>
        <div class="field-label">EMAIL</div>
        <input id="rEmail" type="email" placeholder="you@example.com" autocomplete="email" required />
        <div class="field-hint">We'll send you a one-click link to publish your app. No account needed.</div>
      </div>` : ''}
      <div class="row" style="justify-content:flex-end;gap:8px">
        <button class="btn secondary" id="rCancel">Cancel</button>
        <button class="btn" id="rSave">${isEdit ? 'Save' : (state.user ? '🚀 Deploy' : '✉️ Send me the magic link')}</button>
      </div>
    </div>`);
  const nameInput = $('#rName', modal);
  const subInput = $('#rSub', modal);
  const codeInput = $('#rCode', modal);
  // Set textarea value via property to avoid HTML-escape issues
  codeInput.value = existing?.code || '';
  const normalize = (v) => String(v || '').toLowerCase().replace(/[^a-z0-9-]/g, '-').replace(/^-+|-+$/g, '');
  if (!isEdit) {
    const liveNorm = (input) => input.addEventListener('input', () => {
      const start = input.selectionStart;
      const v = input.value;
      const n = normalize(v);
      if (n !== v) { input.value = n; input.setSelectionRange(start, start); }
    });
    liveNorm(nameInput);
    liveNorm(subInput);
  }
  $('#rSelectAll', modal).onclick = () => { codeInput.focus(); codeInput.select(); };
  $('#rPaste', modal).onclick = async () => {
    try {
      if (!navigator.clipboard?.readText) throw new Error('clipboard not available — paste manually');
      const text = await navigator.clipboard.readText();
      codeInput.value = text;
      codeInput.focus();
      toast('Pasted from clipboard');
    } catch (err) { toast('Paste failed: ' + (err.message || 'permission denied'), 'error'); }
  };
  $('#rClear', modal).onclick = () => { codeInput.value = ''; codeInput.focus(); };
  $('#rCancel', modal).onclick = () => modal.remove();
  $('#rSave', modal).onclick = async () => {
    const name = nameInput.value.trim();
    const subdomain = subInput.value.trim();
    const code = codeInput.value;
    const emailEl = $('#rEmail', modal);
    const isAnon = !state.user;
    try {
      if (existing) {
        await api(`/api/apps/${existing.name}`, { method: 'PUT', body: { code } });
        modal.remove(); toast('Saved'); refresh();
      } else if (isAnon) {
        const email = emailEl?.value.trim();
        if (!email) { toast('Email is required', 'error'); return; }
        const r = await api('/api/pending', { method: 'POST', body: { type: 'react', name, subdomain: subdomain || undefined, code, email } });
        showCheckYourEmailModal(modal, email, r.message);
      } else {
        await api('/api/apps', { method: 'POST', body: { name, subdomain: subdomain || undefined, code } });
        modal.remove(); toast('Deployed'); refresh();
      }
    } catch (err) { toast(err.message, 'error'); }
  };
}

function openHtmlModal(existing) {
  const sample = `<!doctype html>
<html><head><meta charset="utf-8"><title>Hello</title>
<style>body{font-family:system-ui;padding:32px;background:#0b0d12;color:#e6e9ef}</style>
</head><body><h1>Hello from your HTML page</h1></body></html>`;
  const isEdit = !!existing;
  const title = isEdit ? 'Edit HTML Page' : 'Deploy New HTML Page';
  const subInitial = existing && existing.subdomain && existing.subdomain !== existing.name ? existing.subdomain : '';
  const modal = openModal(`
    <h3 style="margin-top:0">${title}</h3>
    <div class="grid" style="gap:14px">
      <div>
        <div class="field-label">PAGE NAME</div>
        <input id="hName" placeholder="e.g. mypage" value="${existing?.name || ''}" ${isEdit ? 'readonly' : ''} autocomplete="off" />
        <div class="field-hint">Lowercase, no spaces</div>
      </div>
      <div>
        <div class="field-label">CUSTOM SUBDOMAIN <span class="muted" style="text-transform:none;letter-spacing:0;font-weight:400">(optional)</span></div>
        <input id="hSub" placeholder="Leave empty to use the name above" value="${subInitial}" ${isEdit ? 'readonly' : ''} autocomplete="off" />
      </div>
      <div>
        <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:6px">
          <div class="field-label" style="margin:0">HTML CODE</div>
          <div class="row" style="gap:6px">
            <button type="button" class="btn tiny" id="hSelectAll">⊞ Select All</button>
            <button type="button" class="btn tiny" id="hPaste">📋 Paste</button>
            <button type="button" class="btn tiny" id="hClear">✕ Clear</button>
          </div>
        </div>
        <textarea id="hHtml" spellcheck="false" placeholder="Paste your full HTML page here (starting with <!DOCTYPE html>)..."></textarea>
        <div class="field-hint">Paste the complete HTML page. It will be deployed as-is.</div>
      </div>
      ${!isEdit && !state.user ? `
      <div>
        <div class="field-label">EMAIL</div>
        <input id="hEmail" type="email" placeholder="you@example.com" autocomplete="email" required />
        <div class="field-hint">We'll send you a one-click link to publish your page. No account needed.</div>
      </div>` : ''}
      <div class="row" style="justify-content:flex-end;gap:8px">
        <button class="btn secondary" id="hCancel">Cancel</button>
        <button class="btn" id="hSave">${isEdit ? 'Save' : (state.user ? '🚀 Deploy' : '✉️ Send me the magic link')}</button>
      </div>
    </div>`);
  const nameInput = $('#hName', modal);
  const subInput = $('#hSub', modal);
  const htmlInput = $('#hHtml', modal);
  // Set textarea value via property (avoids HTML-escape issues with </textarea> in user content)
  htmlInput.value = existing?.html || '';
  const normalize = (v) => String(v || '').toLowerCase().replace(/[^a-z0-9-]/g, '-').replace(/^-+|-+$/g, '');
  if (!isEdit) {
    const liveNorm = (input) => input.addEventListener('input', () => {
      const start = input.selectionStart;
      const v = input.value;
      const n = normalize(v);
      if (n !== v) { input.value = n; input.setSelectionRange(start, start); }
    });
    liveNorm(nameInput);
    liveNorm(subInput);
  }
  $('#hSelectAll', modal).onclick = () => { htmlInput.focus(); htmlInput.select(); };
  $('#hPaste', modal).onclick = async () => {
    try {
      if (!navigator.clipboard?.readText) throw new Error('clipboard not available — paste manually');
      const text = await navigator.clipboard.readText();
      htmlInput.value = text;
      htmlInput.focus();
      toast('Pasted from clipboard');
    } catch (err) { toast('Paste failed: ' + (err.message || 'permission denied'), 'error'); }
  };
  $('#hClear', modal).onclick = () => { htmlInput.value = ''; htmlInput.focus(); };
  $('#hCancel', modal).onclick = () => modal.remove();
  $('#hSave', modal).onclick = async () => {
    const name = nameInput.value.trim();
    const subdomain = subInput.value.trim();
    const html = htmlInput.value;
    const emailEl = $('#hEmail', modal);
    const isAnon = !state.user;
    try {
      if (existing) {
        await api(`/api/html-apps/${existing.name}`, { method: 'PUT', body: { html } });
        modal.remove(); toast('Saved'); refresh();
      } else if (isAnon) {
        const email = emailEl?.value.trim();
        if (!email) { toast('Email is required', 'error'); return; }
        const r = await api('/api/pending', { method: 'POST', body: { type: 'html', name, subdomain: subdomain || undefined, html, email } });
        showCheckYourEmailModal(modal, email, r.message);
      } else {
        await api('/api/html-apps', { method: 'POST', body: { name, subdomain: subdomain || undefined, html } });
        modal.remove(); toast('Deployed'); refresh();
      }
    } catch (err) { toast(err.message, 'error'); }
  };
}

function showCheckYourEmailModal(prevModal, email, message) {
  if (prevModal && prevModal.remove) prevModal.remove();
  openModal(`
    <h3 style="margin-top:0">Check your inbox</h3>
    <p>We sent a one-click link to <strong>${email}</strong>.</p>
    <p class="muted">${message || 'Click it to publish your app and access the dashboard.'}</p>
    <p class="muted" style="font-size:13px">The link expires in 24 hours. If you don't see the email, check your spam folder.</p>
    <div class="row" style="justify-content:flex-end;gap:8px;margin-top:16px">
      <button class="btn" id="ceyClose">Got it</button>
    </div>
  `, (m) => { $('#ceyClose', m).onclick = () => m.remove(); });
}

function openSignInModal() {
  const modal = openModal(`
    <h3 style="margin-top:0">Sign in</h3>
    <div class="grid" style="gap:14px">
      <div>
        <div class="field-label">EMAIL</div>
        <input id="siEmail" type="email" placeholder="you@example.com" autocomplete="email" />
        <div class="field-hint">We'll email you a one-click sign-in link.</div>
      </div>
      <div class="row" style="justify-content:flex-end;gap:8px">
        <button class="btn secondary" id="siCancel">Cancel</button>
        <button class="btn" id="siSendLink">✉️ Send link</button>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:14px">
        <button type="button" class="btn secondary" id="siTogglePw" style="width:100%">Or sign in with admin password</button>
        <div id="siPwBox" style="display:none;margin-top:12px">
          <div class="grid" style="gap:10px">
            <div>
              <div class="field-label">USERNAME</div>
              <input id="siUser" autocomplete="username" />
            </div>
            <div>
              <div class="field-label">PASSWORD</div>
              <input id="siPw" type="password" autocomplete="current-password" />
            </div>
            <div class="row" style="justify-content:flex-end;gap:8px">
              <button class="btn" id="siPwLogin">Log in</button>
            </div>
          </div>
        </div>
      </div>
    </div>`);
  $('#siCancel', modal).onclick = () => modal.remove();
  $('#siSendLink', modal).onclick = async () => {
    const email = $('#siEmail', modal).value.trim();
    if (!email) { toast('Email is required', 'error'); return; }
    try {
      await api('/api/login-link', { method: 'POST', body: { email } });
      showCheckYourEmailModal(modal, email, 'If an account exists for this address, we just sent you a sign-in link.');
    } catch (err) { toast(err.message, 'error'); }
  };
  $('#siTogglePw', modal).onclick = () => {
    const box = $('#siPwBox', modal);
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
  };
  $('#siPwLogin', modal).onclick = async () => {
    const username = $('#siUser', modal).value.trim();
    const password = $('#siPw', modal).value;
    try {
      const r = await api('/api/login', { method: 'POST', body: { username, password } });
      state.user = r.user;
      modal.remove();
      renderUserBox();
      await refresh();
      toast('Signed in');
    } catch (err) { toast(err.message, 'error'); }
  };
}

function maybeShowDeployedBanner() {
  const params = new URLSearchParams(location.search);
  const sub = params.get('deployed');
  if (!sub) return;
  const appDomain = state.meta?.appDomain || state.meta?.parentDomain;
  const url = `https://${sub}.${appDomain}`;
  toast(`✅ Your app is now live at ${url}`, 'ok');
  history.replaceState(null, '', location.pathname);
}

(async function boot() {
  try {
    const r = await api('/api/auth-check');
    state.user = r.user;
  } catch {
    state.user = null;
  }
  renderUserBox();
  await refresh();
  maybeShowDeployedBanner();
})();
</script>
</body>
</html>
